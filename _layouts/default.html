<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": {{ page.title | jsonify }},
        "description": {{ page.description | default: site.description | jsonify }},
        "url": {{ page.url | absolute_url | jsonify }},
        "isPartOf": {
          "@type": "WebSite",
          "name": {{ site.title | jsonify }},
          "url": {{ '/' | absolute_url | jsonify }}
        },
        "about": {
          "@type": "SoftwareApplication",
          "name": "PDF Press",
          "applicationCategory": "DesignApplication",
          "url": "https://www.pdfpress.app"
        }
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">PDF Press Companion</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/checklists/prepress-pdf-toolchain/' | relative_url }}">Checklist</a>
        <a href="{{ '/comparisons/browser-vs-desktop-imposition/' | relative_url }}">Comparison</a>
        <a href="https://www.pdfpress.app">Open PDF Press</a>
      </nav>
    </header>

    <main class="page-shell">
      <aside class="side-panel" aria-label="PDF Press links">
        <p class="eyebrow">Canonical app</p>
        <a class="primary-cta" href="https://www.pdfpress.app">Use PDF Press</a>
        <ul>
          <li><a href="https://www.pdfpress.app/guide">Tool guide</a></li>
          <li><a href="https://www.pdfpress.app/blog">Blog library</a></li>
          <li><a href="https://www.pdfpress.app/llms-full.txt">AI reference</a></li>
          <li><a href="https://www.pdfpress.app/sitemap.xml">Sitemap</a></li>
        </ul>
      </aside>

      <article class="content">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <p>
        This companion is published by the PDF Press team. The canonical product site is
        <a href="https://www.pdfpress.app">https://www.pdfpress.app</a>.
      </p>
    </footer>
  </body>
</html>
